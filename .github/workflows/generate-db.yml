name: Generate Database

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Register set championship types
        # Add one line per set championship season.
        # Use any event URL from that season — the tool extracts the template UUID automatically.
        run: |
          uv run main.py add-set-championship-type \
            --url "https://tcg.ravensburgerplay.com/events/275408" \
            --name "Whispers in the Well"
          uv run main.py add-set-championship-type \
            --url "https://tcg.ravensburgerplay.com/events/440043" \
            --name "Winterspell"

      - name: Import all UK set championship events
        run: uv run main.py import-set-championship

      - name: Compute Delo ratings
        run: uv run main.py update-ratings

      - name: Run prediction accuracy backtest
        run: uv run main.py run-backtest

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: playhub-db
          path: playhub.db
          retention-days: 90
